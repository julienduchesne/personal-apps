<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#7c3aed"/>
  <!-- Guitar body -->
  <g fill="none" stroke="white" stroke-width="2.5">
    <!-- Neck -->
    <rect x="29" y="8" width="6" height="22" rx="1" fill="white" opacity="0.9"/>
    <!-- Frets -->
    <line x1="29" y1="14" x2="35" y2="14" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="29" y1="19" x2="35" y2="19" stroke="#7c3aed" stroke-width="1.5"/>
    <line x1="29" y1="24" x2="35" y2="24" stroke="#7c3aed" stroke-width="1.5"/>
    <!-- Body -->
    <ellipse cx="32" cy="43" rx="14" ry="13" fill="white" opacity="0.9"/>
    <!-- Sound hole -->
    <circle cx="32" cy="43" r="5" fill="#7c3aed"/>
    <!-- Bridge -->
    <line x1="26" y1="50" x2="38" y2="50" stroke="#7c3aed" stroke-width="2"/>
    <!-- Strings -->
    <line x1="31" y1="8" x2="31" y2="50" stroke="#7c3aed" stroke-width="0.7"/>
    <line x1="33" y1="8" x2="33" y2="50" stroke="#7c3aed" stroke-width="0.7"/>
  </g>
</svg>
